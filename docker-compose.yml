# =============================================================================
# Unified Docker Compose for Local Development
# =============================================================================
# Usage:
#   docker compose up -d                    # Start core services (postgres, redis, mail)
#   docker compose --profile admin up -d    # Include pgAdmin & RedisInsight
#   docker compose --profile s3 up -d       # Include MinIO
#   docker compose --profile full up -d     # Start everything
#   docker compose --profile test up -d     # Start test database
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 18 with extensions (custom build)
  # Rebuild after adding extensions: docker compose build postgres
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: ./docker
      dockerfile: Dockerfile.postgres
    image: dev_postgres:18
    container_name: dev_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dev}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  # ---------------------------------------------------------------------------
  # Redis 7 with persistence
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dev_redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  # ---------------------------------------------------------------------------
  # MailHog - Email Testing (SMTP: 1025, Web UI: 8025)
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: dev_mailhog
    ports:
      - '${MAILHOG_SMTP_PORT:-1025}:1025'
      - '${MAILHOG_UI_PORT:-8025}:8025'
    restart: unless-stopped
    networks:
      - dev-network

  # ---------------------------------------------------------------------------
  # pgAdmin 4 - PostgreSQL Management
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dev_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev-network
    profiles:
      - admin
      - full

  # ---------------------------------------------------------------------------
  # RedisInsight - Redis Management
  # ---------------------------------------------------------------------------
  redis-insight:
    image: redis/redisinsight:latest
    container_name: dev_redis_insight
    ports:
      - '${REDIS_INSIGHT_PORT:-5540}:5540'
    volumes:
      - ./data/redis_insight:/data
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dev-network
    profiles:
      - admin
      - full

  # ---------------------------------------------------------------------------
  # MinIO - S3-compatible Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: dev_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - ./data/minio:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-network
    profiles:
      - s3
      - full

  # ---------------------------------------------------------------------------
  # MinIO Init - Create default buckets
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: dev_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/dev --ignore-existing;
      mc anonymous set download local/dev;
      echo 'Default bucket created';
      "
    networks:
      - dev-network
    profiles:
      - s3
      - full

# =============================================================================
# Networks
# =============================================================================
networks:
  dev-network:
    driver: bridge
# =============================================================================
# Note: Using bind mounts (./data/*) for persistence in workspace
# Add ./data to .gitignore to avoid committing data files
# =============================================================================
